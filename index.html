<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal File Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media', // Automatic Light/Dark mode via prefers-color-scheme
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a8a' }
                    }
                }
            }
        }
    </script>
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        @media (prefers-color-scheme: dark) {
            .glass-panel {
                background: rgba(31, 41, 55, 0.7);
            }
        }
        .toast-enter { animation: toastIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .toast-exit { animation: toastOut 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(1rem); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(1rem); } }
        .drag-active { border-color: #3b82f6 !important; background-color: rgba(59, 130, 246, 0.05) !important; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        @media (prefers-color-scheme: dark) { ::-webkit-scrollbar-thumb { background: #475569; } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-200">

    <!-- Header -->
    <header class="sticky top-0 z-40 glass-panel border-b border-gray-200 dark:border-gray-800">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <svg class="w-8 h-8 text-brand-600 dark:text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                <h1 class="text-xl font-bold tracking-tight">OmniConvert</h1>
            </div>
            
            <!-- Global Mode Toggle -->
            <div class="flex items-center space-x-1 bg-gray-100 dark:bg-gray-800 p-1 rounded-lg border border-gray-200 dark:border-gray-700 text-sm">
                <button data-mode="high" class="mode-btn px-3 py-1.5 rounded-md font-medium text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-all">High Quality</button>
                <button data-mode="balanced" class="mode-btn px-3 py-1.5 rounded-md font-medium bg-white text-gray-900 shadow-sm dark:bg-gray-700 dark:text-white transition-all">Balanced</button>
                <button data-mode="speed" class="mode-btn px-3 py-1.5 rounded-md font-medium text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-all">SPEEEED!!!!</button>
                <button data-mode="adaptive" class="mode-btn px-3 py-1.5 rounded-md font-medium text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-all">Adaptive</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 max-w-6xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 flex flex-col gap-8">
        
        <!-- Drag & Drop Zone -->
        <div id="dropzone" class="w-full relative border-2 border-dashed border-gray-300 dark:border-gray-700 rounded-2xl bg-white dark:bg-gray-800 transition-all duration-200 flex flex-col items-center justify-center p-12 text-center group cursor-pointer hover:border-brand-500 dark:hover:border-brand-500 hover:bg-brand-50 dark:hover:bg-brand-900/20">
            <input type="file" id="fileInput" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" multiple>
            <div class="bg-brand-100 dark:bg-gray-700 text-brand-600 dark:text-brand-400 p-4 rounded-full mb-4 group-hover:scale-110 transition-transform">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
            </div>
            <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-1">Drag & Drop files here</h3>
            <p class="text-sm text-gray-500 dark:text-gray-400 max-w-xs">Supports Images, Videos, Audio, PDF, and TXT files. Everything is processed locally.</p>
        </div>

        <!-- Queue Section -->
        <div id="queue-container" class="hidden flex-col gap-4">
            <div class="flex items-center justify-between pb-2 border-b border-gray-200 dark:border-gray-700">
                <h2 class="text-lg font-semibold flex items-center gap-2">
                    Conversion Queue <span id="queue-count" class="bg-gray-100 dark:bg-gray-800 text-sm py-0.5 px-2 rounded-full border border-gray-200 dark:border-gray-700">0</span>
                </h2>
                <div class="flex gap-2">
                    <button id="btn-clear" class="px-3 py-1.5 text-sm font-medium text-red-600 hover:bg-red-50 dark:text-red-400 dark:hover:bg-red-900/20 rounded-lg transition-colors">Clear Queue</button>
                    <button id="btn-dl-individual" class="px-3 py-1.5 text-sm font-medium bg-gray-100 text-gray-700 hover:bg-gray-200 dark:bg-gray-800 dark:text-gray-200 dark:hover:bg-gray-700 rounded-lg transition-colors border border-gray-200 dark:border-gray-700">Download All (Indiv)</button>
                    <button id="btn-dl-zip" class="px-3 py-1.5 text-sm font-medium bg-brand-600 text-white hover:bg-brand-700 rounded-lg shadow-sm transition-colors flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        Download ZIP
                    </button>
                </div>
            </div>

            <!-- List of Files -->
            <div id="file-list" class="flex flex-col gap-3">
                <!-- Items generated via JS -->
            </div>
        </div>

    </main>

    <!-- Toasts Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

    <!-- Application Logic -->
    <script type="module">
        // --- FFmpeg Configuration via ESM Modules (Bypassing module restrictions) ---
        import { FFmpeg } from 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js';
        import { fetchFile } from 'https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js';

        // --- Custom Robust Blob Fetcher ---
        // Bypasses strict iframe/sandbox restrictions that cause standard toBlobURL to fail
        async function robustFetchBlobURL(url, mimeType) {
            try {
                const res = await fetch(url, { mode: 'cors' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const buf = await res.arrayBuffer();
                const blob = new Blob([buf], { type: mimeType });
                return URL.createObjectURL(blob);
            } catch (err) {
                console.warn(`robustFetchBlobURL failed for ${url}:`, err);
                throw err;
            }
        }

        // --- State Management ---
        const state = {
            mode: 'balanced',
            queue: [],
            ffmpeg: null,
            ffmpegLoading: false
        };

        // --- Conversion Settings & Modes ---
        const MODES = {
            'high': { imgQuality: 1.0, crf: 17, preset: 'slow' },
            'balanced': { imgQuality: 0.85, crf: 23, preset: 'medium' },
            'speed': { imgQuality: 0.60, crf: 30, preset: 'ultrafast' }
        };

        function getSettings(file) {
            if (state.mode !== 'adaptive') return MODES[state.mode];
            const sizeMB = file.size / (1024 * 1024);
            if (sizeMB > 50) return MODES['speed'];
            if (sizeMB < 10) return MODES['high'];
            return MODES['balanced'];
        }

        // --- DOM Elements ---
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('file-list');
        const queueContainer = document.getElementById('queue-container');
        const queueCount = document.getElementById('queue-count');
        const modeBtns = document.querySelectorAll('.mode-btn');

        // --- Initialization ---
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // --- UI Event Listeners ---
        modeBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                modeBtns.forEach(b => {
                    b.classList.remove('bg-white', 'text-gray-900', 'shadow-sm', 'dark:bg-gray-700', 'dark:text-white');
                    b.classList.add('text-gray-500', 'dark:text-gray-400');
                });
                const target = e.target;
                target.classList.remove('text-gray-500', 'dark:text-gray-400');
                target.classList.add('bg-white', 'text-gray-900', 'shadow-sm', 'dark:bg-gray-700', 'dark:text-white');
                state.mode = target.dataset.mode;
                showToast(`Mode set to: ${target.innerText}`);
            });
        });

        ['dragover', 'dragenter'].forEach(e => dropzone.addEventListener(e, ev => {
            ev.preventDefault();
            dropzone.classList.add('drag-active');
        }));
        ['dragleave', 'dragend', 'drop'].forEach(e => dropzone.addEventListener(e, ev => {
            ev.preventDefault();
            dropzone.classList.remove('drag-active');
        }));

        dropzone.addEventListener('drop', e => handleFiles(e.dataTransfer.files));
        fileInput.addEventListener('change', e => {
            handleFiles(e.target.files);
            fileInput.value = ''; // reset
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            state.queue.forEach(item => { if (item.objectUrl) URL.revokeObjectURL(item.objectUrl); });
            state.queue = [];
            renderQueue();
            showToast('Queue cleared', 'info');
        });

        document.getElementById('btn-dl-zip').addEventListener('click', downloadZip);
        document.getElementById('btn-dl-individual').addEventListener('click', downloadIndividual);

        // --- File Handling Logic ---
        function handleFiles(files) {
            let added = 0;
            Array.from(files).forEach(file => {
                const targetOptions = getTargetOptions(file.type);
                if (targetOptions.length > 0) {
                    state.queue.push({
                        id: Math.random().toString(36).substr(2, 9),
                        file: file,
                        targetExt: targetOptions[0], // default to first option
                        options: targetOptions,
                        status: 'pending', // pending, processing, done, error
                        progress: 0,
                        resultBlob: null,
                        objectUrl: null
                    });
                    added++;
                } else {
                    showToast(`Unsupported file type: ${file.name}`, 'error');
                }
            });
            if (added > 0) {
                renderQueue();
                showToast(`Added ${added} file(s) to queue`);
            }
        }

        function getTargetOptions(mimeType) {
            if (mimeType.startsWith('image/')) return ['jpeg', 'png', 'webp', 'gif', 'pdf'];
            if (mimeType.startsWith('video/')) return ['mp4', 'webm', 'mp3', 'gif'];
            if (mimeType.startsWith('audio/')) return ['mp3', 'wav'];
            if (mimeType === 'application/pdf') return ['jpeg', 'png'];
            if (mimeType === 'text/plain') return ['pdf'];
            return [];
        }

        function getMimeFromExt(ext) {
            const map = {
                'jpeg': 'image/jpeg', 'png': 'image/png', 'webp': 'image/webp', 'gif': 'image/gif',
                'mp4': 'video/mp4', 'webm': 'video/webm',
                'mp3': 'audio/mpeg', 'wav': 'audio/wav',
                'pdf': 'application/pdf'
            };
            return map[ext] || 'application/octet-stream';
        }

        // --- Core Render Logic ---
        function renderQueue() {
            if (state.queue.length === 0) {
                queueContainer.classList.add('hidden');
                return;
            }
            queueContainer.classList.remove('hidden');
            queueCount.innerText = state.queue.length;
            fileList.innerHTML = '';

            state.queue.forEach(item => {
                const el = document.createElement('div');
                el.className = 'bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 flex flex-col gap-3 shadow-sm transition-all';
                
                const sizeStr = (item.file.size / 1024 / 1024).toFixed(2) + ' MB';
                const isProcessing = item.status === 'processing';
                const isDone = item.status === 'done';
                
                el.innerHTML = `
                    <div class="flex items-center justify-between gap-4">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <div class="p-2 bg-gray-100 dark:bg-gray-700 rounded-lg text-gray-500 dark:text-gray-400 shrink-0">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            </div>
                            <div class="flex flex-col truncate">
                                <span class="font-medium text-sm truncate" title="${item.file.name}">${item.file.name}</span>
                                <span class="text-xs text-gray-500 dark:text-gray-400">${sizeStr}</span>
                            </div>
                        </div>

                        <div class="flex items-center gap-3 shrink-0">
                            <div class="flex items-center gap-2">
                                <span class="text-sm text-gray-500">to</span>
                                <select class="target-select bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 text-sm rounded-md px-2 py-1 focus:ring-brand-500 focus:border-brand-500 outline-none" ${isProcessing || isDone ? 'disabled' : ''}>
                                    ${item.options.map(opt => `<option value="${opt}" ${item.targetExt === opt ? 'selected' : ''}>${opt.toUpperCase()}</option>`).join('')}
                                </select>
                            </div>

                            ${isDone ? `
                                <button class="btn-dl px-3 py-1.5 bg-green-500 hover:bg-green-600 text-white rounded-md text-sm font-medium flex items-center gap-1 transition-colors">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                    Save
                                </button>
                            ` : `
                                <button class="btn-convert px-3 py-1.5 bg-brand-600 hover:bg-brand-700 text-white rounded-md text-sm font-medium flex items-center gap-1 transition-colors ${isProcessing ? 'opacity-50 cursor-not-allowed' : ''}" ${isProcessing ? 'disabled' : ''}>
                                    ${isProcessing ? `<svg class="animate-spin w-4 h-4" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Processing...` : `Convert`}
                                </button>
                            `}
                            
                            <button class="btn-remove text-gray-400 hover:text-red-500 transition-colors p-1" title="Remove">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>
                    </div>
                    
                    ${isProcessing ? `
                        <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-1.5 mt-1 overflow-hidden">
                            <div class="bg-brand-500 h-1.5 rounded-full transition-all duration-300" style="width: ${item.progress}%"></div>
                        </div>
                    ` : ''}
                `;

                // Event Listeners for the item
                if (!isProcessing && !isDone) {
                    el.querySelector('.target-select').addEventListener('change', (e) => {
                        item.targetExt = e.target.value;
                    });
                    el.querySelector('.btn-convert').addEventListener('click', () => processItem(item));
                }

                if (isDone) {
                    el.querySelector('.btn-dl').addEventListener('click', () => {
                        triggerDownload(item.objectUrl, getOutputName(item.file.name, item.targetExt));
                    });
                }

                el.querySelector('.btn-remove').addEventListener('click', () => {
                    if (item.objectUrl) URL.revokeObjectURL(item.objectUrl);
                    state.queue = state.queue.filter(q => q.id !== item.id);
                    renderQueue();
                });

                fileList.appendChild(el);
            });
        }

        // --- Conversion Engines ---

        // 1. Setup FFmpeg
        async function loadFFmpeg() {
            if (state.ffmpeg) return state.ffmpeg;
            if (state.ffmpegLoading) {
                // wait for it
                while(state.ffmpegLoading) await new Promise(r => setTimeout(r, 100));
                if (state.ffmpeg) return state.ffmpeg;
            }
            state.ffmpegLoading = true;
            
            showToast("Initializing Media Engine...", "info");
            const ffmpeg = new FFmpeg();
            
            // Prefer UMD builds as they are often more robust against cross-origin module blocks than ESM
            const cdns = [
                'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd',
                'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd'
            ];

            let loaded = false;

            // Helper to prevent infinite hangs
            const withTimeout = (promise, ms = 15000) => {
                return Promise.race([
                    promise,
                    new Promise((_, reject) => setTimeout(() => reject(new Error('Network timeout')), ms))
                ]);
            };

            for (const baseURL of cdns) {
                try {
                    console.log(`Attempting to load FFmpeg from: ${baseURL}`);
                    
                    // Strategy 1: Aggressive custom blob URLs (safest for strict cross-origin caching/sandboxes)
                    try {
                        const coreURL = await robustFetchBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript');
                        const wasmURL = await robustFetchBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm');
                        
                        await withTimeout(ffmpeg.load({
                            coreURL: coreURL,
                            wasmURL: wasmURL,
                        }));
                        loaded = true;
                        break;
                    } catch (blobErr) {
                        console.warn(`robustFetchBlobURL failed for ${baseURL}, attempting direct URLs...`, blobErr);
                        
                        // Strategy 2: Direct URL loading
                        await withTimeout(ffmpeg.load({
                            coreURL: `${baseURL}/ffmpeg-core.js`,
                            wasmURL: `${baseURL}/ffmpeg-core.wasm`,
                        }));
                        loaded = true;
                        break;
                    }
                } catch (err) {
                    console.warn(`Failed completely to load from ${baseURL}:`, err);
                }
            }

            if (!loaded) {
                console.warn("All FFmpeg loading attempts failed. Engaging Extreme Native Fallback.");
                state.ffmpegLoading = false;
                state.ffmpeg = 'native'; // Trigger the extreme fallback
                showToast("Engine blocked by browser sandbox. Using limited native fallback.", "error");
                return 'native';
            }

            state.ffmpeg = ffmpeg;
            state.ffmpegLoading = false;
            return ffmpeg;
        }

        // 2. Process Controller
        async function processItem(item) {
            item.status = 'processing';
            item.progress = 0;
            renderQueue();

            try {
                const settings = getSettings(item.file);
                let blob;

                const inputMime = item.file.type;
                const outExt = item.targetExt;

                // PDF to Image
                if (inputMime === 'application/pdf') {
                    blob = await convertPdfToImage(item.file, outExt, settings, (p) => updateProgress(item, p));
                }
                // Text to PDF
                else if (inputMime === 'text/plain' && outExt === 'pdf') {
                    blob = await convertTextToPdf(item.file);
                }
                // Image to PDF
                else if (inputMime.startsWith('image/') && outExt === 'pdf') {
                    blob = await convertImageToPdf(item.file);
                }
                // Image to Image (Canvas)
                else if (inputMime.startsWith('image/') && ['jpeg', 'png', 'webp'].includes(outExt)) {
                    blob = await convertImageToImage(item.file, outExt, settings);
                }
                // Media Conversion (FFmpeg) - Videos, Audio, or GIF creation
                else {
                    blob = await convertMedia(item, settings);
                }

                item.resultBlob = blob;
                item.objectUrl = URL.createObjectURL(blob);
                item.status = 'done';
                item.progress = 100;
                showToast(`Converted ${item.file.name} successfully!`);

            } catch (err) {
                console.error(err);
                item.status = 'error';
                showToast(`Error converting ${item.file.name}: ${err.message}`, 'error');
            }

            renderQueue();
        }

        function updateProgress(item, progress) {
            item.progress = progress;
            renderQueue(); // In a real massive app, update DOM directly for perf. Re-rendering small list is ok.
        }

        function getOutputName(originalName, targetExt) {
            const base = originalName.substring(0, originalName.lastIndexOf('.')) || originalName;
            return `${base}_converted.${targetExt}`;
        }

        // --- Specific Converters ---

        async function convertImageToImage(file, targetExt, settings) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    
                    const mime = getMimeFromExt(targetExt);
                    canvas.toBlob(blob => {
                        if (blob) resolve(blob);
                        else reject(new Error("Canvas conversion failed"));
                    }, mime, settings.imgQuality);
                };
                img.onerror = () => reject(new Error("Failed to read image"));
                img.src = URL.createObjectURL(file);
            });
        }

        async function convertImageToPdf(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const { jsPDF } = window.jspdf;
                        const doc = new jsPDF();
                        const imgData = e.target.result;
                        const imgProps = doc.getImageProperties(imgData);
                        const pdfWidth = doc.internal.pageSize.getWidth();
                        const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                        
                        doc.addImage(imgData, file.type.split('/')[1].toUpperCase(), 0, 0, pdfWidth, pdfHeight);
                        resolve(doc.output('blob'));
                    } catch (err) { reject(err); }
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function convertTextToPdf(file) {
            const text = await file.text();
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const margin = 10;
            const pdfWidth = doc.internal.pageSize.getWidth() - (margin * 2);
            
            doc.setFontSize(12);
            const lines = doc.splitTextToSize(text, pdfWidth);
            doc.text(lines, margin, margin + 5);
            return doc.output('blob');
        }

        async function convertPdfToImage(file, targetExt, settings, onProgress) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            const page = await pdf.getPage(1); // Only converting first page for simplicity
            
            const viewport = page.getViewport({ scale: settings.imgQuality > 0.8 ? 2.0 : 1.0 });
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            
            onProgress(50); // Rendering
            await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
            
            return new Promise((resolve) => {
                canvas.toBlob(resolve, getMimeFromExt(targetExt), settings.imgQuality);
            });
        }

        async function convertMedia(item, settings) {
            const ffmpeg = await loadFFmpeg();
            
            // --- EXTREME FALLBACK ROUTING ---
            if (ffmpeg === 'native') {
                return await nativeConvertMedia(item, settings);
            }

            const ext = item.file.name.split('.').pop();
            const inputName = `input.${ext}`;
            const outputName = `output.${item.targetExt}`;

            // Write input
            await ffmpeg.writeFile(inputName, await fetchFile(item.file));

            ffmpeg.on('progress', ({ progress }) => {
                // FFmpeg progress is 0 to 1.
                updateProgress(item, Math.round(progress * 100));
            });

            let args = ['-i', inputName];

            // Build Arguments
            if (['mp4', 'webm'].includes(item.targetExt)) {
                args.push('-crf', settings.crf.toString(), '-preset', settings.preset);
                if (state.mode === 'speed' || (state.mode === 'adaptive' && item.file.size > 50*1024*1024)) {
                    args.push('-map_metadata', '-1'); // Strip metadata
                }
            } else if (['mp3', 'wav'].includes(item.targetExt)) {
                if (item.targetExt === 'mp3') {
                    args.push('-q:a', settings.crf < 20 ? '0' : (settings.crf < 25 ? '2' : '5'));
                }
            } else if (item.targetExt === 'gif') {
                args.push('-vf', `fps=10,scale=320:-1:flags=lanczos,split[s0][s1];[s0]palettegen[p];[s1][p]paletteuse`);
            }

            args.push(outputName);

            // Execute
            await ffmpeg.exec(args);

            // Read result
            const data = await ffmpeg.readFile(outputName);
            
            // Clean up memory
            await ffmpeg.deleteFile(inputName);
            await ffmpeg.deleteFile(outputName);
            ffmpeg.off('progress');

            return new Blob([data.buffer], { type: getMimeFromExt(item.targetExt) });
        }

        async function nativeConvertMedia(item, settings) {
            return new Promise((resolve, reject) => {
                const isVideo = item.file.type.startsWith('video/');
                const mediaEl = document.createElement(isVideo ? 'video' : 'audio');
                mediaEl.src = URL.createObjectURL(item.file);
                mediaEl.muted = true; // Required to bypass browser autoplay blocks
                mediaEl.crossOrigin = 'anonymous';
                
                // Must be attached to DOM for stream capture to work reliably in all browsers
                mediaEl.style.display = 'none';
                document.body.appendChild(mediaEl);

                mediaEl.onloadedmetadata = () => {
                    try {
                        const captureMethod = mediaEl.captureStream || mediaEl.mozCaptureStream;
                        if (!captureMethod) throw new Error("Your browser doesn't support native stream capture.");
                        
                        const stream = captureMethod.call(mediaEl);
                        
                        // Pick the best natively supported mimeType
                        let mimeType = '';
                        if (isVideo) {
                            mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' 
                                     : MediaRecorder.isTypeSupported('video/webm') ? 'video/webm' : 'video/mp4';
                        } else {
                            mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
                        }

                        const options = (mimeType !== 'video/mp4' && mimeType !== 'audio/mp4') ? { mimeType } : undefined;
                        const recorder = new MediaRecorder(stream, options);
                        const chunks = [];

                        recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                        
                        recorder.onstop = () => {
                            document.body.removeChild(mediaEl);
                            
                            // Because native fallback formats are limited (mostly webm), dynamically update the item UI target
                            const finalExt = isVideo ? (mimeType.includes('mp4') ? 'mp4' : 'webm') : 'webm';
                            if (item.targetExt !== finalExt) {
                                item.targetExt = finalExt;
                                showToast(`Target adjusted to ${finalExt.toUpperCase()}. For MP4, save this file and open locally.`, 'error');
                                renderQueue();
                            }
                            resolve(new Blob(chunks, { type: mimeType }));
                        };

                        mediaEl.onended = () => recorder.stop();
                        
                        // Tie video playback progress to the UI progress bar
                        mediaEl.ontimeupdate = () => {
                            if (mediaEl.duration) {
                                updateProgress(item, Math.min(100, Math.round((mediaEl.currentTime / mediaEl.duration) * 100)));
                            }
                        };

                        mediaEl.play().then(() => {
                            recorder.start();
                        }).catch(err => {
                            document.body.removeChild(mediaEl);
                            reject(new Error("Native playback block: " + err.message));
                        });

                    } catch (err) {
                        document.body.removeChild(mediaEl);
                        reject(err);
                    }
                };
                
                mediaEl.onerror = () => {
                    document.body.removeChild(mediaEl);
                    reject(new Error("Failed to decode the media file natively."));
                };
            });
        }


        // --- Batch Downloads ---

        function triggerDownload(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        async function downloadIndividual() {
            const completed = state.queue.filter(i => i.status === 'done');
            if (completed.length === 0) return showToast("No completed files to download", "info");
            
            showToast(`Downloading ${completed.length} files...`, "info");
            for (let i = 0; i < completed.length; i++) {
                const item = completed[i];
                triggerDownload(item.objectUrl, getOutputName(item.file.name, item.targetExt));
                await new Promise(r => setTimeout(r, 400)); // Prevent browser blocking
            }
        }

        async function downloadZip() {
            const completed = state.queue.filter(i => i.status === 'done');
            if (completed.length === 0) return showToast("No completed files to zip", "info");
            
            showToast("Generating ZIP archive...", "info");
            const zip = new JSZip();
            
            completed.forEach(item => {
                zip.file(getOutputName(item.file.name, item.targetExt), item.resultBlob);
            });

            const zipBlob = await zip.generateAsync({ type: 'blob' });
            const zipUrl = URL.createObjectURL(zipBlob);
            triggerDownload(zipUrl, 'OmniConvert_Archive.zip');
            setTimeout(() => URL.revokeObjectURL(zipUrl), 10000);
            showToast("ZIP download started!");
        }

        // --- Toasts System ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const bg = type === 'error' ? 'bg-red-500' : (type === 'info' ? 'bg-gray-800' : 'bg-brand-600');
            const icon = type === 'error' 
                ? `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`
                : `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;

            toast.className = `flex items-center gap-2 ${bg} text-white px-4 py-3 rounded-lg shadow-lg toast-enter`;
            toast.innerHTML = `${icon} <span class="text-sm font-medium">${message}</span>`;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-exit');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

    </script>
